services:
  ratchetup_db:
    image: postgres:16-alpine
    container_name: ratchetup_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ratchetup
      POSTGRES_USER: ratchetup
      POSTGRES_PASSWORD: RatchetUpDB@2026
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - backend

  ratchetup_api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ratchetup_api
    restart: unless-stopped
    depends_on:
      - ratchetup_db
    environment:
      - DATABASE_URL=postgresql://ratchetup:RatchetUpDB@2026@ratchetup_db:5432/ratchetup
      - PORT=6565
      - JWT_SECRET=TopDubaiJWT@2026SecretKey#Prod
      - VIRTUAL_HOST=api.ratchetup.ai
      - VIRTUAL_PORT=6565
      - LETSENCRYPT_HOST=api.ratchetup.ai
      - LETSENCRYPT_EMAIL=isaac.ochieng2000@gmail.com
    volumes:
      - uploads:/app/uploads
      - appdata:/app/data
    expose:
      - "6565"
    networks:
      - proxy
      - backend

networks:
  proxy:
    external: true
  backend:
    driver: bridge

volumes:
  pgdata:
  uploads:
  appdata:
